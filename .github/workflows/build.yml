name: Build, Push and Deploy

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/copilot-review.yml'

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/vityas-life
  SERVICE_NAME: vityas-life
  DEPLOY_PATH: /opt/vityas-life

jobs:
  changes:
    name: Detect app changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - 'index.html'
              - 'assets/**'
              - 'Dockerfile'
              - 'nginx.conf'
              - 'docker-compose.yml'
              - '.dockerignore'
              - 'README.md'
              - '.github/workflows/build.yml'

  test-app:
    name: Validate app
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate repository files
        run: |
          test -f index.html
          test -f Dockerfile
          test -f docker-compose.yml
          test -f nginx.conf
          test -f assets/images/box.png
          test -f assets/sounds/background.mp3

  build-image:
    name: Build image
    needs: [changes, test-app]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image tar
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          outputs: type=docker,dest=/tmp/vityas-life-image.tar
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: vityas-life-image-tar
          path: /tmp/vityas-life-image.tar
          if-no-files-found: error
          retention-days: 1

  push-image:
    name: Push image
    needs: [changes, build-image]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: vityas-life-image-tar
          path: /tmp
      - name: Load image
        run: docker load --input /tmp/vityas-life-image.tar
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push branch tag
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
      - name: Push sha tag
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy app
    needs: [changes, push-image]
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Upload compose file
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p ${{ env.DEPLOY_PATH }}"
          scp -P ${{ secrets.VPS_PORT }} docker-compose.yml ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/docker-compose.yml
      - name: Deploy app on server
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            cd ${{ env.DEPLOY_PATH }}
            printf 'IMAGE_NAME=%s\nIMAGE_TAG=%s\nHOST_PORT=%s\n' '${{ env.IMAGE_NAME }}' '${{ github.ref_name }}' '8080' > .env
            docker compose pull ${{ env.SERVICE_NAME }}
            docker compose up -d ${{ env.SERVICE_NAME }}
          "

  cleanup-images:
    name: Cleanup images
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Cleanup old images on server
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
            set -e
            IMAGE_REPO='${{ env.IMAGE_NAME }}'
            KEEP_BRANCH_TAG='${{ github.ref_name }}'
            KEEP_SHA='${{ github.sha }}'

            docker image ls \"\$IMAGE_REPO\" --format '{{.Repository}}:{{.Tag}}' \
              | while read -r ref; do
                  tag=\${ref##*:}
                  if [ \"\$tag\" != \"\$KEEP_BRANCH_TAG\" ] && [ \"\$tag\" != \"\$KEEP_SHA\" ]; then
                    docker image rm \"\$ref\" || true
                  fi
                done

            docker image prune -f
          "
