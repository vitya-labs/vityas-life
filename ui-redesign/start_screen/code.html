<!DOCTYPE html>

<style>.material-symbols-outlined {
    font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24
    }
.grain-texture {
    background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuAzEy9B_BitaKH6DbM3Z7wHO5qRKnzqEtmymqMzCQgbtpevV2li6Lykjt7dNXiwCl8qOgLlvYdW4tYdQPf9w5cCOjoxZKBhz1XLYU5E0xg2b42Xw9Rf0WoQ-YAd75izqV1OYCS3MZ75fuT1gseK-w6jXp8yJIGSUGV66EI6oKbzNIbPLJRKa5ba5jhbESW2vsTtjKd0i45Do-M27vj4O8OhOGLi4Ex77kO3-ZfI0XaR4RzjcRcx86b11YN3apP94hhFXR0uxSmsT8bS)
    }
.monitor-flicker {
    animation: flicker 0.15s infinite alternate
    }
@keyframes flicker {
    0% {
        opacity: 0.97;
        } 100% {
        opacity: 1;
        }
    }
.scanline {
    background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
    background-size: 100% 4px
    }</style>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen overflow-hidden flex flex-col items-center justify-center grain-texture">
<!-- Background Layer: The Desk -->
<div class="absolute inset-0 z-0 pointer-events-none bg-surface-dim opacity-40"></div>
<!-- TopAppBar Fragment: Branding & Status -->
<header class="fixed top-0 left-0 w-full px-6 py-3 flex justify-between items-center z-50 bg-[#fff5e4] dark:bg-[#1a1a1a]">
<div class="flex items-center gap-3">
<span class="text-2xl font-black text-[#705900] dark:text-[#fdd34d] uppercase font-['Space_Grotesk'] tracking-tight">Vitya's Life</span>
</div>
<div class="flex items-center gap-4 text-[#7d7668] dark:text-[#b4ac9c]">
<span class="material-symbols-outlined hover:bg-[#fdd34d]/20 transition-colors rounded-full p-2 cursor-pointer">settings</span>
<span class="material-symbols-outlined hover:bg-[#fdd34d]/20 transition-colors rounded-full p-2 cursor-pointer">help</span>
</div>
</header>
<!-- Main Desk Canvas -->
<main class="relative z-10 w-full max-w-6xl h-full flex flex-col items-center justify-center px-4">
<!-- The Focal Monitor -->
<div class="relative group mb-12">
<!-- Monitor Base/Frame -->
<div class="bg-surface-variant p-4 rounded-xl shadow-2xl rotate-[-0.5deg] border-b-8 border-outline-variant/30">
<div class="bg-inverse-surface w-[80vw] max-w-[800px] aspect-[4/3] rounded-sm overflow-hidden relative monitor-flicker shadow-inner">
<!-- Scanlines effect -->
<div class="absolute inset-0 scanline pointer-events-none opacity-20"></div>
<!-- Screen Content -->
<div class="absolute inset-0 flex flex-col items-center justify-center p-8">
<h1 class="font-headline font-black text-6xl md:text-8xl text-primary-container tracking-tighter text-center uppercase leading-none mb-4">
                            Vitya's<br/>Life
                        </h1>
<p class="font-label text-surface-container-low/60 uppercase tracking-widest text-sm md:text-base">
                            Employee ID: #802 — Active Session
                        </p>
<div class="mt-12 opacity-80">
<img class="w-48 h-32 object-cover mix-blend-screen opacity-50 grayscale contrast-125" data-alt="retro pixel art office dashboard on an old CRT monitor with glitchy graphs and tiny folders" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIMO0ujEvPtgrm2yNPrwzdCd4rUEUv1stO-oLMbfBXRcGv0rO0X4gqveatdv9-bHbfpDpuScYltB8OMbBTmzzlDtwBjk3gePdlQzAhTki4_zX3RNDnSPngPYFcxljG-9-P4ZDgScl5Mv-lcl1l_hCZGnMecdJlTwjs1p8nuoxQCdDsJtifgdJYwwNhO35URz69tRtbjYXJcAAaYNPqjfXY3TN7L7BG0qkB9AGLnrOVx_2C5vr76mh2o8Gn6lARL4YO-KL1KNidEUXx"/>
</div>
</div>
</div>
</div>
<!-- Floating Elements on Desk -->
<!-- Plant -->
<div class="absolute -left-16 -bottom-8 w-40 h-40 transform -rotate-3 hover:rotate-0 transition-transform">
<img class="w-full h-full object-contain" data-alt="charming pixel art potted succulent sitting on a messy desk with soft sunlight hitting its leaves" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAoovo9ZJz6IbybZdRP9-hZiHSEV5eFLgoizfQB4aYlp78Q3hJ9hc-YpMk7mHaxexMut_BfoKJrEw8Ai4fz8kNoVgAK7eVY8_duenekVSCMWs9yEEJDWQ41feOA3gQ4I4CsqK7xwilE0CfpM7NStmBymotqJO_IQB9rcjvmF4d-qCSg4q-4yaS_iJEVvqVeACYtZZ-DXsba6p0axlJyHNfU_qT_0liBwv2y9J8m7RfOXJZqiTLLoqXTkhCb4zt6KMArPIQ4ejp4qGf3"/>
</div>
<!-- Coffee Stain -->
<div class="absolute -right-12 -top-12 w-32 h-32 opacity-30 transform rotate-12">
<div class="w-24 h-24 rounded-full border-[6px] border-primary-dim/20"></div>
<div class="absolute top-4 left-6 w-16 h-16 rounded-full border-[3px] border-primary-dim/10"></div>
</div>
</div>
<!-- Start Actions (The Sticky Notes) -->
<div class="flex flex-col items-center gap-6 w-full max-w-md">
<!-- Press Start: The Primary Sticky Note -->
<button class="group relative transform hover:scale-105 active:scale-95 transition-all rotate-2 hover:-rotate-1">
<div class="absolute inset-0 bg-secondary-container shadow-xl translate-x-1 translate-y-1"></div>
<div class="relative bg-secondary-container p-8 px-16 border-b-2 border-r-2 border-secondary/20 flex flex-col items-center">
<span class="font-headline font-black text-4xl text-on-secondary-container uppercase tracking-tight">START GAME</span>
<div class="flex items-center gap-2 mt-2">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="font-label text-xs font-bold text-on-secondary-container/70">URGENT!</span>
</div>
</div>
<!-- Peeling corner effect -->
<div class="absolute top-0 right-0 w-8 h-8 bg-surface-dim shadow-inner rotate-45 translate-x-4 -translate-y-4"></div>
</button>
<!-- Secondary Actions -->
<div class="flex gap-8 mt-4">
<!-- Options Sticky -->
<button class="relative transform rotate-[-4deg] hover:rotate-0 transition-all">
<div class="bg-primary-container p-4 px-8 shadow-lg border-b-2 border-primary/20">
<span class="font-headline font-bold text-on-primary-container text-lg">OPTIONS</span>
</div>
</button>
<!-- Exit Sticky -->
<button class="relative transform rotate-[3deg] hover:rotate-0 transition-all">
<div class="bg-error-container p-4 px-8 shadow-lg border-b-2 border-error/20">
<span class="font-headline font-bold text-on-error-container text-lg">EXIT</span>
</div>
</button>
</div>
</div>
</main>
<!-- Bottom Scraps & Disclaimers -->
<footer class="fixed bottom-0 w-full flex justify-between items-end p-8 pointer-events-none">
<!-- Don't Forget Note -->
<div class="bg-primary-container/90 p-4 transform -rotate-6 shadow-md w-32 hidden md:block">
<span class="font-label text-[10px] text-on-primary-container block border-b border-on-primary-container/20 pb-1">TODO:</span>
<span class="font-label text-xs font-bold text-on-primary-container leading-none italic">DON'T FORGET LUNCH!</span>
</div>
<!-- Corporate Small Print -->
<div class="text-right">
<p class="font-label text-[10px] text-outline uppercase tracking-widest leading-none">Bureaucratic Whimsy Framework v1.0.4</p>
<p class="font-label text-[10px] text-outline uppercase tracking-widest">© 2024 Vitya's Life Corp. No Rights Reserved.</p>
</div>
</footer>
<!-- BottomNavBar Fragment: Game Controls -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#fff5e4]/85 dark:bg-[#1a1a1a]/85 backdrop-blur-md border-t-2 border-[#b4ac9c]/15">
<button class="flex flex-col items-center justify-center text-[#7d7668] p-2 hover:-rotate-1 transition-transform">
<span class="material-symbols-outlined">undo</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold mt-1">Undo</span>
</button>
<button class="flex flex-col items-center justify-center text-[#7d7668] p-2 hover:-rotate-1 transition-transform">
<span class="material-symbols-outlined">refresh</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold mt-1">Reset</span>
</button>
<button class="flex flex-col items-center justify-center text-[#7d7668] p-2 hover:-rotate-1 transition-transform">
<span class="material-symbols-outlined">lightbulb</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase font-bold mt-1">Hints</span>
</button>
</nav>
</body></html>
